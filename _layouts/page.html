---
layout: default
---
<article class="page wrap">
  {%- if page.title and page.show_title != false -%}
    <header class="page-head">
      <h1>{{ page.title }}</h1>
      {%- if page.subtitle -%}<p class="page-subtitle">{{ page.subtitle }}</p>{%- endif -%}
    </header>
  {%- endif -%}
  <div class="prose">
    {{ content }}
  </div>
</article>
