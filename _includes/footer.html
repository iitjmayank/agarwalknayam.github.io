<footer class="site-footer">
  <div class="wrap footer-inner">
    <span class="footer-copy">© {{ site.time | date: "%Y" }} {{ site.author }}</span>
    <nav class="footer-social">
      {%- if site.social.github != "" -%}
        <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener">GitHub</a>
      {%- endif -%}
      {%- if site.social.twitter != "" -%}
        <a href="https://twitter.com/{{ site.social.twitter }}" target="_blank" rel="noopener">Twitter</a>
      {%- endif -%}
      {%- if site.social.linkedin != "" -%}
        <a href="{{ site.social.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
      {%- endif -%}
      {%- if site.social.email != "" -%}
        <a href="mailto:{{ site.social.email }}">Email</a>
      {%- endif -%}
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </nav>
  </div>
</footer>
