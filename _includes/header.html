<header class="site-header">
  <div class="wrap header-inner">
    <a class="site-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="nav-burger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </label>

    <nav class="site-nav">
      {%- for item in site.nav -%}
        {%- assign cur = page.url | remove: 'index.html' -%}
        <a href="{{ item.url | relative_url }}"
           class="{% if cur contains item.url %}is-active{% endif %}">{{ item.title }}</a>
      {%- endfor -%}
    </nav>
  </div>
</header>
